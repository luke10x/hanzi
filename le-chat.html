<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hanzi Writer Test</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@2.0.0/dist/hanzi-writer.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    #canvas-container {
      width: 300px;
      height: 300px;
      border: 1px solid #000;
      margin: 20px 0;
    }
    #character-target {
      width: 100%;
      height: 100%;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h1>Hanzi Writer Test</h1>
  <div id="canvas-container">
    <div id="character-target"></div>
  </div>
  <button id="load-char">Load Character</button>
  <button id="clear">Clear</button>

  <script>
    let writer = null;

    document.getElementById('load-char').addEventListener('click', () => {
      // Clear previous writer if it exists
      if (writer) {
        writer.destroy();
        writer = null;
      }

      // Create new writer
      writer = HanziWriter.create('character-target', '中', {
        width: 300,
        height: 300,
        padding: 5,
        showCharacter: false,
        showOutline: true
      });

      writer.quiz({
        onMistake: (strokeData) => {
          console.log('Mistake on stroke', strokeData.strokeNum);
        },
        onCorrectStroke: (strokeData) => {
          console.log('Correct stroke', strokeData.strokeNum);
        },
        onComplete: () => {
          console.log('Character completed!');
        }
      });
    });

    document.getElementById('clear').addEventListener('click', () => {
      if (writer) {
        writer.destroy();
        writer = null;
        document.getElementById('character-target').innerHTML = '';
      }
    });
  </script>
</body>
</html>
