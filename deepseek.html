<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Hanzi Canvas | Stroke Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@2.2.1/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 700px;
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .burger-menu {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .burger-menu:hover { background: #f1f5f9; }
        
        .mode-toggles {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .toggle-btn {
            background: #eef2ff;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }
        .toggle-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        .copy-log-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
        }
        
        .question-row {
            padding: 14px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
        }
        
        .boxes-container {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 14px;
        }
        
        .hanzi-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            border-radius: 16px;
            padding: 8px 6px;
            min-width: 78px;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: all 0.1s;
        }
        .hanzi-card.active-card {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .char-box {
            width: 64px;
            height: 64px;
            background: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 500;
        }
        .char-box.state-none { background: #f1f5f9; border: 1px solid #cbd5e1; }
        .char-box.state-started { background: #fef9c3; border: 1px solid #eab308; }
        .char-box.state-completed { background: #bbf7d0; border: 1px solid #22c55e; }
        
        .pinyin-label {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #475569;
        }
        
        .canvas-area {
            background: #ffffff;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: min(75vw, 400px);
            margin: 0 auto;
            background: #fefefe;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        
        #active-canvas-container {
            width: 100%;
            height: 100%;
        }
        
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e293b;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: 8px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background: #0f172a;
            color: #cbd5e1;
            font-size: 0.8rem;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            background: #0f172a;
            color: #cbd5e6;
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
        }
        
        .menu-panel {
            width: 280px;
            background: white;
            height: 100%;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }
        
        .history-list li {
            background: #f1f5f9;
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        
        .remove-history {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }
        
        .ai-prompt-area {
            padding: 20px;
            background: #fef9e3;
            border-radius: 24px;
            margin: 16px;
            text-align: center;
        }
        
        textarea {
            width: 100%;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            padding: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            margin: 12px 0;
        }
        
        button { cursor: pointer; }
        .close-menu { background: #e2e8f0; border: none; padding: 10px; border-radius: 40px; }
        .fallback-canvas { width: 100%; height: 100%; background: white; cursor: crosshair; }
        .error-badge { color: #dc2626; text-align: center; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="app" id="appRoot">
    <div class="top-bar">
        <button class="burger-menu" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="mode-toggles">
            <button id="toggleContourBtn" class="toggle-btn">✍️ Contour OFF</button>
        </div>
        <button id="copyEntireLogBtn" class="copy-log-btn"><i class="far fa-copy"></i> Copy Log</button>
    </div>
    <div class="question-row" id="questionText">— Ready —</div>
    <div class="boxes-container" id="boxesContainer"></div>
    <div class="canvas-area">
        <div class="canvas-wrapper">
            <div id="active-canvas-container"></div>
        </div>
    </div>
    <div class="log-section">
        <div class="log-header"><span>✍️ Practice Log</span></div>
        <div class="log-content" id="logMessages"></div>
    </div>
</div>

<script>
    // State
    let currentPayload = null;
    let boxesData = [];
    let activeBoxIndex = 0;
    let showContour = false;
    let historyEntries = [];
    let logEntries = [];
    
    // DOM elements
    const questionEl = document.getElementById('questionText');
    const boxesContainer = document.getElementById('boxesContainer');
    const activeCanvasDiv = document.getElementById('active-canvas-container');
    const logMessagesDiv = document.getElementById('logMessages');
    const toggleContourBtn = document.getElementById('toggleContourBtn');
    const copyEntireLogBtn = document.getElementById('copyEntireLogBtn');
    const burgerBtn = document.getElementById('burgerBtn');
    
    // Helper: add log message
    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEntries.push(`[${time}] ${msg}`);
        if (logEntries.length > 200) logEntries.shift();
        renderLog();
    }
    
    function renderLog() {
        if (!logEntries.length) {
            logMessagesDiv.innerHTML = '<span>✨ Draw strokes — feedback appears here ✨</span>';
        } else {
            logMessagesDiv.innerHTML = logEntries.map(l => `<div>${escapeHtml(l)}</div>`).join('');
            logMessagesDiv.scrollTop = logMessagesDiv.scrollHeight;
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Copy log
    copyEntireLogBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(logEntries.join('\n')).then(() => addLog('📋 Log copied'));
    });
    
    // Destroy writer
    function destroyWriter(box) {
        if (box && box.writer) {
            try { box.writer.destroy(); } catch(e) {}
            box.writer = null;
        }
    }
    
    // Update box card visual
    function updateBoxCardVisual(idx) {
        const card = document.querySelector(`.hanzi-card[data-idx='${idx}']`);
        if (!card) return;
        const charDiv = card.querySelector('.char-box');
        const state = boxesData[idx].state;
        charDiv.classList.remove('state-none', 'state-started', 'state-completed');
        charDiv.classList.add(`state-${state}`);
        document.querySelectorAll('.hanzi-card').forEach(c => c.classList.remove('active-card'));
        card.classList.add('active-card');
    }
    
    // Render character boxes
    function renderBoxes() {
        if (!currentPayload || !boxesData.length) {
            boxesContainer.innerHTML = '<div style="padding:12px">📦 No characters loaded</div>';
            return;
        }
        boxesContainer.innerHTML = '';
        boxesData.forEach((box, idx) => {
            const card = document.createElement('div');
            card.className = 'hanzi-card';
            card.setAttribute('data-idx', idx);
            card.innerHTML = `
                <div class="char-box state-${box.state}">${box.character}</div>
                <div class="pinyin-label">${box.pinyin || ''}</div>
            `;
            card.addEventListener('click', () => {
                if (activeBoxIndex === idx) return;
                activeBoxIndex = idx;
                loadActiveCanvas();
                renderBoxes();
            });
            boxesContainer.appendChild(card);
        });
        const activeCard = document.querySelector(`.hanzi-card[data-idx='${activeBoxIndex}']`);
        if (activeCard) activeCard.classList.add('active-card');
    }
    
    // Fallback drawing canvas (simple sketchpad)
    let fallbackActive = false;
    let fallbackCtx = null;
    let drawing = false;
    let lastX = 0, lastY = 0;
    
    function initFallbackCanvas(container, character, onComplete) {
        container.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.className = 'fallback-canvas';
        const size = Math.min(container.clientWidth, container.clientHeight, 400);
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        container.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        let started = false;
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        }
        
        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const { x, y } = getCoords(e);
            lastX = x;
            lastY = y;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 0.5, y + 0.5);
            ctx.stroke();
            if (!started) {
                started = true;
                addLog(`✏️ Started drawing "${character}" (fallback mode)`);
            }
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x;
            lastY = y;
        }
        
        function endDraw() {
            drawing = false;
        }
        
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);
        
        // Add clear button
        const clearBtn = document.createElement('button');
        clearBtn.textContent = 'Clear';
        clearBtn.style.position = 'absolute';
        clearBtn.style.bottom = '8px';
        clearBtn.style.right = '8px';
        clearBtn.style.background = '#ef4444';
        clearBtn.style.color = 'white';
        clearBtn.style.border = 'none';
        clearBtn.style.borderRadius = '20px';
        clearBtn.style.padding = '4px 12px';
        clearBtn.style.fontSize = '0.7rem';
        clearBtn.style.cursor = 'pointer';
        clearBtn.style.zIndex = '10';
        clearBtn.onclick = (e) => {
            e.stopPropagation();
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3b82f6';
            addLog(`🔄 Cleared fallback canvas for "${character}"`);
        };
        container.style.position = 'relative';
        container.appendChild(clearBtn);
        
        fallbackActive = true;
        return canvas;
    }
    
    // Load active canvas with proper error handling
    function loadActiveCanvas() {
        if (!currentPayload || !boxesData.length) return;
        const box = boxesData[activeBoxIndex];
        if (!box) return;
        
        activeCanvasDiv.innerHTML = '';
        const containerId = `writer-${Date.now()}-${activeBoxIndex}`;
        const container = document.createElement('div');
        container.id = containerId;
        container.style.width = '100%';
        container.style.height = '100%';
        activeCanvasDiv.appendChild(container);
        
        destroyWriter(box);
        
        const rect = container.parentElement.getBoundingClientRect();
        const size = Math.min(rect.width, rect.height, 400);
        
        // Try HanziWriter with timeout
        let timeoutId = setTimeout(() => {
            if (!box.writer && box.state !== 'completed') {
                addLog(`⚠️ "${box.character}" - Using fallback drawing mode (stroke data unavailable)`);
                initFallbackCanvas(activeCanvasDiv, box.character, () => {});
                if (box.state === 'none') box.state = 'started';
                updateBoxCardVisual(activeBoxIndex);
            }
        }, 2000);
        
        try {
            const writer = HanziWriter.create(containerId, box.character, {
                width: size,
                height: size,
                showCharacter: false,
                padding: 8,
                showOutline: showContour,
                strokeColor: '#3b82f6',
                radicalColor: '#cbd5e1'
            });
            
            box.writer = writer;
            clearTimeout(timeoutId);
            
            setTimeout(() => {
                if (box.state === 'completed') {
                    try {
                        writer.setCharacter(box.character);
                        writer.animateCharacter();
                    } catch(e) {}
                } else {
                    if (box.state === 'none') box.state = 'started';
                    updateBoxCardVisual(activeBoxIndex);
                    
                    try {
                        writer.quiz({
                            onMistake: (data) => {
                                addLog(`❌ [${box.character}] stroke ${data.strokeNum} mistake (total: ${data.totalMistakes})`);
                            },
                            onCorrectStroke: (data) => {
                                addLog(`✅ [${box.character}] stroke ${data.strokeNum} correct!`);
                            },
                            onComplete: (summary) => {
                                addLog(`🎉 [${box.character}] COMPLETED! Total mistakes: ${summary.totalMistakes}`);
                                box.state = 'completed';
                                updateBoxCardVisual(activeBoxIndex);
                                if (box.writer) {
                                    try {
                                        box.writer.setCharacter(box.character);
                                        box.writer.animateCharacter();
                                    } catch(e) {}
                                }
                            }
                        });
                    } catch(err) {
                        addLog(`⚠️ Quiz error for "${box.character}", switching to fallback`);
                        initFallbackCanvas(activeCanvasDiv, box.character);
                    }
                }
            }, 100);
            
        } catch(err) {
            clearTimeout(timeoutId);
            addLog(`📝 "${box.character}" - Using simple drawing mode`);
            initFallbackCanvas(activeCanvasDiv, box.character);
            if (box.state === 'none') box.state = 'started';
            updateBoxCardVisual(activeBoxIndex);
        }
    }
    
    // Apply payload (decode UTF-8 properly)
    function applyPayload(payload) {
        if (currentPayload && JSON.stringify(currentPayload) !== JSON.stringify(payload)) {
            const exists = historyEntries.some(e => JSON.stringify(e) === JSON.stringify(payload));
            if (!exists) {
                historyEntries.unshift(payload);
                if (historyEntries.length > 20) historyEntries.pop();
                saveHistoryToLocal();
            }
        }
        
        currentPayload = payload;
        questionEl.innerText = payload.question || "Practice Hanzi";
        
        boxesData.forEach(box => destroyWriter(box));
        boxesData = [];
        
        for (let ans of payload.answers) {
            boxesData.push({
                character: ans.character,
                pinyin: ans.pinyin || "",
                state: 'none',
                writer: null
            });
        }
        
        activeBoxIndex = 0;
        renderBoxes();
        setTimeout(() => {
            if (boxesData.length) loadActiveCanvas();
        }, 50);
        
        addLog(`📚 Loaded: "${payload.question}" — ${boxesData.length} character(s)`);
    }
    
    // Decode base64 with UTF-8 support
    function base64ToUtf8(str) {
        try {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) {
            return atob(str);
        }
    }
    
    // Load from URL
    function loadFromURL() {
        let encoded = null;
        if (window.location.hash && window.location.hash.length > 1) {
            encoded = window.location.hash.substring(1);
        } else {
            const params = new URLSearchParams(window.location.search);
            if (params.has('data')) encoded = params.get('data');
        }
        
        if (encoded) {
            try {
                const jsonStr = base64ToUtf8(encoded);
                const payload = JSON.parse(jsonStr);
                if (payload.question && Array.isArray(payload.answers) && payload.answers.length > 0) {
                    applyPayload(payload);
                    return true;
                }
            } catch(e) {
                addLog(`⚠️ Invalid payload: ${e.message}`);
            }
        }
        return false;
    }
    
    // Local storage
    function saveHistoryToLocal() {
        try {
            localStorage.setItem('hanzi_history_v3', JSON.stringify(historyEntries));
        } catch(e) {}
    }
    
    function loadHistoryFromLocal() {
        try {
            const stored = localStorage.getItem('hanzi_history_v3');
            if (stored) historyEntries = JSON.parse(stored).slice(0, 20);
        } catch(e) {}
    }
    
    // Menu
    function showMenu() {
        const overlay = document.createElement('div');
        overlay.className = 'menu-overlay';
        const panel = document.createElement('div');
        panel.className = 'menu-panel';
        panel.innerHTML = `<h4>📜 Previous Questions</h4><ul class="history-list" id="menuHistoryList"></ul><button class="close-menu" id="closeMenuBtn">Close</button>`;
        
        const list = panel.querySelector('#menuHistoryList');
        if (historyEntries.length === 0) {
            list.innerHTML = '<li style="background:transparent">No history</li>';
        } else {
            historyEntries.forEach((entry, idx) => {
                const li = document.createElement('li');
                const shortQ = entry.question.length > 35 ? entry.question.slice(0, 32) + '…' : entry.question;
                li.innerHTML = `<span>${escapeHtml(shortQ)}</span><button class="remove-history" data-idx="${idx}">✕</button>`;
                li.querySelector('.remove-history').addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyEntries.splice(idx, 1);
                    saveHistoryToLocal();
                    showMenu();
                });
                li.addEventListener('click', () => { applyPayload(entry); closeMenu(overlay); });
                list.appendChild(li);
            });
        }
        overlay.appendChild(panel);
        document.body.appendChild(overlay);
        document.getElementById('closeMenuBtn').addEventListener('click', () => closeMenu(overlay));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeMenu(overlay); });
    }
    
    function closeMenu(overlay) { if (overlay?.parentNode) overlay.remove(); }
    burgerBtn.addEventListener('click', showMenu);
    
    // Contour toggle
    toggleContourBtn.addEventListener('click', () => {
        showContour = !showContour;
        toggleContourBtn.innerText = showContour ? "📐 Contour ON" : "✍️ Contour OFF";
        toggleContourBtn.classList.toggle('active', showContour);
        if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        addLog(`Contour ${showContour ? 'enabled' : 'disabled'}`);
    });
    
    // Empty state
    function showEmptyPrompt() {
        questionEl.innerText = "🤖 AI Hanzi Learning";
        boxesContainer.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'ai-prompt-area';
        div.innerHTML = `
            <strong>✨ No active quiz</strong><br>
            <textarea id="aiPromptText" rows="4">Create a Hanzi practice JSON:
{
  "question": "What is 'hello' in Chinese?",
  "answers": [
    { "character": "你好", "pinyin": "nǐ hǎo" },
    { "character": "朋友", "pinyin": "péng you" }
  ]
}
Encode to base64 and use: app.html#BASE64_HERE</textarea>
            <button id="copyPromptBtn">📋 Copy Prompt</button>
            <div style="margin-top:12px; font-size:0.7rem;">Example: <code>#eyJxdWVzdGlvbiI6IuS9oOWwj+WQjeWtliIsImFuc3dlcnMiOlt7ImNoYXJhY3RlciI6IuS9oOWwjSIsInBpbnlpbiI6Im7DgyBo4oCfbyJ9XX0=</code></div>
        `;
        boxesContainer.appendChild(div);
        activeCanvasDiv.innerHTML = '<div style="text-align:center; padding:2rem;">⬆️ Add #payload to URL</div>';
        document.getElementById('copyPromptBtn')?.addEventListener('click', () => {
            const txt = document.getElementById('aiPromptText').value;
            navigator.clipboard.writeText(txt);
            addLog("📋 Prompt copied");
        });
    }
    
    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        }, 200);
    });
    
    window.addEventListener('hashchange', () => {
        const loaded = loadFromURL();
        if (!loaded && !currentPayload) showEmptyPrompt();
    });
    
    // Init
    function init() {
        loadHistoryFromLocal();
        const loaded = loadFromURL();
        if (!loaded) showEmptyPrompt();
    }
    
    init();
