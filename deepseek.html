<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Hanzi Canvas | Stroke Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@2.2.1/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 700px;
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .burger-menu {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .burger-menu:hover { background: #f1f5f9; }
        
        .control-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .ctrl-btn {
            background: #eef2ff;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .ctrl-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        .copy-log-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .landing-link {
            background: #8b5cf6;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .question-row {
            padding: 14px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
        }
        
        .hint-row {
            padding: 8px 20px;
            background: #fef9c3;
            border-bottom: 1px solid #eab308;
            font-size: 0.85rem;
            color: #854d0e;
            text-align: center;
            display: none;
        }
        .hint-row.visible {
            display: block;
        }
        
        .boxes-container {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 14px;
        }
        
        .hanzi-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            border-radius: 16px;
            padding: 8px 6px;
            min-width: 78px;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: all 0.1s;
        }
        .hanzi-card.active-card {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .char-box {
            width: 64px;
            height: 64px;
            background: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 500;
            position: relative;
        }
        .char-box.state-none { background: #f1f5f9; border: 1px solid #cbd5e1; }
        .char-box.state-started { background: #fef9c3; border: 1px solid #eab308; }
        .char-box.state-completed { background: #bbf7d0; border: 1px solid #22c55e; }
        
        .char-box .char-text {
            display: none;
            font-size: 2rem;
        }
        .char-box.state-completed .char-text {
            display: inline;
        }
        .char-box.state-none::before, .char-box.state-started::before {
            content: "?";
            font-size: 2rem;
            font-weight: bold;
            color: #94a3b8;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .pinyin-label {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #475569;
        }
        
        .canvas-area {
            background: #ffffff;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: min(75vw, 400px);
            margin: 0 auto;
            background: #fefefe;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        
        #active-canvas-container {
            width: 100%;
            height: 100%;
        }
        
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e293b;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: 8px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background: #0f172a;
            color: #cbd5e1;
            font-size: 0.8rem;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            background: #0f172a;
            color: #cbd5e6;
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
        }
        
        .menu-panel {
            width: 320px;
            background: white;
            height: 100%;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }
        
        .history-list li {
            background: #f1f5f9;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }
        
        .remove-history {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 4px;
        }
        
        .close-menu {
            background: #e2e8f0;
            border: none;
            padding: 10px;
            border-radius: 40px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        /* Landing page builder UI */
        .builder-panel {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            margin: 16px;
        }
        
        .builder-panel h3 {
            margin: 0 0 12px 0;
            font-size: 1.2rem;
        }
        
        .builder-input {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .builder-input label {
            display: block;
            color: #334155;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .builder-input input, .builder-input textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: monospace;
        }
        
        .builder-input textarea {
            font-family: monospace;
            font-size: 0.8rem;
        }
        
        .pinyin-group {
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .generate-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .result-link {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            word-break: break-all;
            font-size: 0.7rem;
            font-family: monospace;
        }
        
        .copy-link-btn {
            background: #3b82f6;
            margin-top: 8px;
            padding: 6px;
        }
        
        .char-preview {
            display: inline-block;
            font-size: 1.2rem;
            margin-left: 8px;
        }
        
        @media (max-width: 550px) {
            .ctrl-btn { font-size: 0.7rem; padding: 4px 8px; }
            .landing-link { font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="app" id="appRoot">
    <div class="top-bar">
        <button class="burger-menu" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="control-group">
            <button id="toggleGridBtn" class="ctrl-btn">🔲 Grid OFF</button>
            <button id="toggleContourBtn" class="ctrl-btn">✍️ Contour OFF</button>
            <button id="toggleHintBtn" class="ctrl-btn">💡 Hint OFF</button>
        </div>
        <div style="display: flex; gap: 6px;">
            <a href="#" id="landingLinkBtn" class="landing-link"><i class="fas fa-home"></i> New</a>
            <button id="copyEntireLogBtn" class="copy-log-btn"><i class="far fa-copy"></i> Copy</button>
        </div>
    </div>
    <div class="question-row" id="questionText">— Ready —</div>
    <div class="hint-row" id="hintRow"></div>
    <div class="boxes-container" id="boxesContainer"></div>
    <div class="canvas-area">
        <div class="canvas-wrapper">
            <div id="active-canvas-container"></div>
        </div>
    </div>
    <div class="log-section">
        <div class="log-header"><span>✍️ Practice Log (copy & share with AI)</span></div>
        <div class="log-content" id="logMessages"></div>
    </div>
</div>

<script>
    // ---------------------------- STATE ---------------------------------
    let currentPayload = null;
    let boxesData = [];
    let activeBoxIndex = 0;
    let showContour = false;
    let showGrid = false;
    let showHint = false;
    let currentHint = "";
    let historyEntries = [];
    let logEntries = [];
    
    // DOM elements
    const questionEl = document.getElementById('questionText');
    const hintRow = document.getElementById('hintRow');
    const boxesContainer = document.getElementById('boxesContainer');
    const activeCanvasDiv = document.getElementById('active-canvas-container');
    const logMessagesDiv = document.getElementById('logMessages');
    const toggleGridBtn = document.getElementById('toggleGridBtn');
    const toggleContourBtn = document.getElementById('toggleContourBtn');
    const toggleHintBtn = document.getElementById('toggleHintBtn');
    const copyEntireLogBtn = document.getElementById('copyEntireLogBtn');
    const burgerBtn = document.getElementById('burgerBtn');
    const landingLinkBtn = document.getElementById('landingLinkBtn');
    
    // Helper: add log
    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEntries.push(`[${time}] ${msg}`);
        if (logEntries.length > 500) logEntries.shift();
        renderLog();
        saveHistoryToLocal();
    }
    
    function renderLog() {
        if (!logEntries.length) {
            logMessagesDiv.innerHTML = '<span>✨ Draw strokes — feedback appears here ✨</span>';
        } else {
            logMessagesDiv.innerHTML = logEntries.map(l => `<div>${escapeHtml(l)}</div>`).join('');
            logMessagesDiv.scrollTop = logMessagesDiv.scrollHeight;
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Copy log
    copyEntireLogBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(logEntries.join('\n')).then(() => addLog('📋 Log copied to clipboard'));
    });
    
    // Landing page (show builder UI)
    landingLinkBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = '';
        currentPayload = null;
        boxesData.forEach(b => { if (b.writer) try { b.writer.destroy(); } catch(e) {} });
        boxesData = [];
        showBuilderUI();
        addLog('🏠 Switched to lesson builder');
    });
    
    // Destroy writer
    function destroyWriter(box) {
        if (box && box.writer) {
            try { box.writer.destroy(); } catch(e) {}
            box.writer = null;
        }
    }
    
    // Update box card visual
    function updateBoxCardVisual(idx) {
        const card = document.querySelector(`.hanzi-card[data-idx='${idx}']`);
        if (!card) return;
        const charDiv = card.querySelector('.char-box');
        const state = boxesData[idx].state;
        charDiv.classList.remove('state-none', 'state-started', 'state-completed');
        charDiv.classList.add(`state-${state}`);
        
        document.querySelectorAll('.hanzi-card').forEach(c => c.classList.remove('active-card'));
        card.classList.add('active-card');
    }
    
    // Render boxes
    function renderBoxes() {
        if (!currentPayload || !boxesData.length) {
            boxesContainer.innerHTML = '<div style="padding:12px">📦 No characters loaded</div>';
            return;
        }
        boxesContainer.innerHTML = '';
        boxesData.forEach((box, idx) => {
            const card = document.createElement('div');
            card.className = 'hanzi-card';
            card.setAttribute('data-idx', idx);
            card.innerHTML = `
                <div class="char-box state-${box.state}">
                    <span class="char-text">${box.character}</span>
                </div>
                <div class="pinyin-label">${box.pinyin || ''}</div>
            `;
            card.addEventListener('click', () => {
                if (activeBoxIndex === idx) return;
                activeBoxIndex = idx;
                loadActiveCanvas();
                renderBoxes();
            });
            boxesContainer.appendChild(card);
        });
        const activeCard = document.querySelector(`.hanzi-card[data-idx='${activeBoxIndex}']`);
        if (activeCard) activeCard.classList.add('active-card');
    }
    
    // Load active canvas - NO radical colors, only one stroke color
    function loadActiveCanvas() {
        if (!currentPayload || !boxesData.length) return;
        const box = boxesData[activeBoxIndex];
        if (!box) return;
        
        activeCanvasDiv.innerHTML = '';
        const containerId = `writer-${Date.now()}-${activeBoxIndex}`;
        const container = document.createElement('div');
        container.id = containerId;
        container.style.width = '100%';
        container.style.height = '100%';
        activeCanvasDiv.appendChild(container);
        
        destroyWriter(box);
        
        const rect = container.parentElement.getBoundingClientRect();
        const size = Math.min(rect.width, rect.height, 400);
        
        try {
            // Use single color for all strokes - no radical distinction
            const writer = HanziWriter.create(containerId, box.character, {
                width: size,
                height: size,
                showCharacter: false,
                padding: 8,
                showOutline: showContour,
                showGrid: showGrid,
                strokeColor: '#1e293b',      // Dark slate for all strokes
                radicalColor: null,           // No separate radical color
                renderDemoStrokeHighlight: false
            });
            
            box.writer = writer;
            
            setTimeout(() => {
                if (box.state === 'completed') {
                    try {
                        writer.setCharacter(box.character);
                        writer.animateCharacter();
                    } catch(e) {}
                } else {
                    if (box.state === 'none') box.state = 'started';
                    updateBoxCardVisual(activeBoxIndex);
                    
                    writer.quiz({
                        onMistake: (data) => {
                            addLog(`❌ [${box.character}] stroke ${data.strokeNum} mistake (total: ${data.totalMistakes})`);
                        },
                        onCorrectStroke: (data) => {
                            addLog(`✅ [${box.character}] stroke ${data.strokeNum} correct!`);
                        },
                        onComplete: (summary) => {
                            addLog(`🎉 [${box.character}] COMPLETED! Total mistakes: ${summary.totalMistakes}`);
                            box.state = 'completed';
                            updateBoxCardVisual(activeBoxIndex);
                            renderBoxes();
                            if (box.writer) {
                                try {
                                    box.writer.setCharacter(box.character);
                                    box.writer.animateCharacter();
                                } catch(e) {}
                            }
                        }
                    });
                }
            }, 100);
            
        } catch(err) {
            addLog(`⚠️ Error loading "${box.character}": ${err.message}`);
            activeCanvasDiv.innerHTML = `<div style="text-align:center; padding:2rem; color:#dc2626;">⚠️ "${box.character}" not supported</div>`;
        }
    }
    
    // Apply payload
    function applyPayload(payload) {
        // Save to history if different from current
        if (currentPayload && JSON.stringify(currentPayload) !== JSON.stringify(payload)) {
            const exists = historyEntries.some(e => JSON.stringify(e) === JSON.stringify(payload));
            if (!exists) {
                historyEntries.unshift(payload);
                if (historyEntries.length > 20) historyEntries.pop();
                saveHistoryToLocal();
            }
        } else if (!currentPayload) {
            // First load
            const exists = historyEntries.some(e => JSON.stringify(e) === JSON.stringify(payload));
            if (!exists) {
                historyEntries.unshift(payload);
                if (historyEntries.length > 20) historyEntries.pop();
                saveHistoryToLocal();
            }
        }
        
        currentPayload = payload;
        questionEl.innerText = payload.question || "Practice Hanzi";
        currentHint = payload.hint || "";
        if (currentHint && showHint) {
            hintRow.innerText = `💡 Hint: ${currentHint}`;
            hintRow.classList.add('visible');
        } else {
            hintRow.classList.remove('visible');
        }
        
        // Parse answer string into characters
        const answerStr = payload.answer;
        const pinyinArray = payload.pinyin || [];
        const characters = [];
        
        for (let ch of answerStr) {
            if (ch.trim() && !ch.match(/\s/)) {
                characters.push(ch);
            }
        }
        
        boxesData.forEach(box => destroyWriter(box));
        boxesData = [];
        
        for (let i = 0; i < characters.length; i++) {
            boxesData.push({
                character: characters[i],
                pinyin: pinyinArray[i] || "",
                state: 'none',
                writer: null
            });
        }
        
        activeBoxIndex = 0;
        renderBoxes();
        setTimeout(() => {
            if (boxesData.length) loadActiveCanvas();
        }, 50);
        
        addLog(`📚 Loaded: "${payload.question}" — ${boxesData.length} character(s)`);
    }
    
    // Base64 UTF-8 handling
    function base64ToUtf8(str) {
        try {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) {
            return atob(str);
        }
    }
    
    function utf8ToBase64(str) {
        const bytes = new TextEncoder().encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }
    
    // Load from URL hash
    function loadFromURL() {
        let encoded = null;
        if (window.location.hash && window.location.hash.length > 1) {
            encoded = window.location.hash.substring(1);
        }
        
        if (encoded) {
            try {
                const jsonStr = base64ToUtf8(encoded);
                const payload = JSON.parse(jsonStr);
                if (payload.question && payload.answer && Array.isArray(payload.pinyin)) {
                    applyPayload(payload);
                    return true;
                }
            } catch(e) {
                addLog(`⚠️ Invalid payload: ${e.message}`);
            }
        }
        return false;
    }
    
    // Save/load settings
    function saveSettings() {
        localStorage.setItem('hanzi_settings', JSON.stringify({
            showContour, showGrid, showHint
        }));
    }
    
    function loadSettings() {
        try {
            const saved = localStorage.getItem('hanzi_settings');
            if (saved) {
                const settings = JSON.parse(saved);
                showContour = settings.showContour || false;
                showGrid = settings.showGrid || false;
                showHint = settings.showHint || false;
            }
        } catch(e) {}
        toggleContourBtn.innerText = showContour ? "📐 Contour ON" : "✍️ Contour OFF";
        toggleContourBtn.classList.toggle('active', showContour);
        toggleGridBtn.innerText = showGrid ? "🔲 Grid ON" : "🔲 Grid OFF";
        toggleGridBtn.classList.toggle('active', showGrid);
        toggleHintBtn.innerText = showHint ? "💡 Hint ON" : "💡 Hint OFF";
        toggleHintBtn.classList.toggle('active', showHint);
    }
    
    // Save history with logs too
    function saveHistoryToLocal() {
        try {
            const toStore = {
                history: historyEntries,
                logs: logEntries.slice(-100)
            };
            localStorage.setItem('hanzi_history_v5', JSON.stringify(toStore));
        } catch(e) {}
    }
    
    function loadHistoryFromLocal() {
        try {
            const stored = localStorage.getItem('hanzi_history_v5');
            if (stored) {
                const data = JSON.parse(stored);
                historyEntries = (data.history || []).slice(0, 20);
                logEntries = data.logs || [];
                renderLog();
            }
        } catch(e) {}
    }
    
    // Builder UI - helpful landing page
    function showBuilderUI() {
        questionEl.innerText = "🏮 Hanzi Lesson Builder";
        boxesContainer.innerHTML = '';
        
        const builderHTML = `
            <div class="builder-panel">
                <h3><i class="fas fa-magic"></i> Create Your Lesson</h3>
                <div class="builder-input">
                    <label>📝 Question (English):</label>
                    <input type="text" id="builderQuestion" placeholder="e.g., How do you say 'Thank you' in Chinese?" value="How do you say 'Thank you' in Chinese?">
                </div>
                <div class="builder-input">
                    <label>汉字 Answer (Chinese characters):</label>
                    <input type="text" id="builderAnswer" placeholder="e.g., 谢谢" value="谢谢">
                    <div id="charCount" style="font-size:0.7rem; margin-top:4px; color:#cbd5e1;"></div>
                </div>
                <div class="builder-input">
                    <label>🎵 Pinyin (space or comma separated, matching characters):</label>
                    <input type="text" id="builderPinyin" placeholder="e.g., xiè xie" value="xiè xie">
                </div>
                <div class="builder-input">
                    <label>💡 Hint (optional):</label>
                    <textarea id="builderHint" rows="2" placeholder="e.g., Two identical characters meaning gratitude"></textarea>
                </div>
                <button class="generate-btn" id="generateLessonBtn"><i class="fas fa-link"></i> Generate Practice Link</button>
                <div id="generatedLinkContainer" style="display:none;">
                    <div class="result-link" id="generatedLink"></div>
                    <button id="copyLinkBtn" class="generate-btn copy-link-btn" style="background:#3b82f6;">📋 Copy Link</button>
                    <button id="useLinkBtn" class="generate-btn copy-link-btn" style="background:#8b5cf6;">🎯 Start Practice</button>
                </div>
            </div>
            <div style="padding: 16px; text-align: center; font-size:0.75rem; color:#64748b;">
                <i class="fas fa-info-circle"></i> Your practice history is saved automatically
            </div>
        `;
        
        boxesContainer.innerHTML = builderHTML;
        activeCanvasDiv.innerHTML = '<div style="text-align:center; padding:2rem; color:#94a3b8;"><i class="fas fa-pencil-alt"></i> Build a lesson above to start practicing</div>';
        
        // Add event listener to show char count
        const answerInput = document.getElementById('builderAnswer');
        const charCount = document.getElementById('charCount');
        if (answerInput) {
            answerInput.addEventListener('input', () => {
                const chars = answerInput.value.replace(/\s/g, '');
                charCount.innerHTML = `📊 ${chars.length} character(s) detected`;
            });
            charCount.innerHTML = `📊 ${answerInput.value.replace(/\s/g, '').length} character(s) detected`;
        }
        
        document.getElementById('generateLessonBtn')?.addEventListener('click', () => {
            const question = document.getElementById('builderQuestion').value;
            const answer = document.getElementById('builderAnswer').value;
            let pinyinStr = document.getElementById('builderPinyin').value;
            const hint = document.getElementById('builderHint').value;
            
            if (!question || !answer) {
                alert('Please fill in question and answer');
                return;
            }
            
            // Clean answer: remove spaces, get characters
            const cleanAnswer = answer.replace(/\s/g, '');
            const pinyinArray = pinyinStr.split(/[\s,]+/).filter(p => p.trim());
            
            if (pinyinArray.length !== cleanAnswer.length) {
                alert(`Pinyin count (${pinyinArray.length}) doesn't match character count (${cleanAnswer.length}). Please adjust.`);
                return;
            }
            
            const payload = {
                question: question,
                answer: cleanAnswer,
                pinyin: pinyinArray,
                hint: hint || ""
            };
            
            const jsonStr = JSON.stringify(payload);
            const base64 = utf8ToBase64(jsonStr);
            const url = window.location.origin + window.location.pathname + '#' + base64;
            
            document.getElementById('generatedLinkContainer').style.display = 'block';
            document.getElementById('generatedLink').innerHTML = url;
            
            document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(url);
                alert('Link copied!');
            });
            
            document.getElementById('useLinkBtn')?.addEventListener('click', () => {
                window.location.hash = base64;
                loadFromURL();
            });
        });
    }
    
    // Menu with previous questions
    function showMenu() {
        const overlay = document.createElement('div');
        overlay.className = 'menu-overlay';
        const panel = document.createElement('div');
        panel.className = 'menu-panel';
        panel.innerHTML = `<h4>📜 Previous Questions</h4><ul class="history-list" id="menuHistoryList"></ul><button class="close-menu" id="closeMenuBtn">Close Menu</button>`;
        
        const list = panel.querySelector('#menuHistoryList');
        if (historyEntries.length === 0) {
            list.innerHTML = '<li style="background:transparent; text-align:center;">No history yet. Create a lesson first!</li>';
        } else {
            historyEntries.forEach((entry, idx) => {
                const li = document.createElement('li');
                const shortQ = entry.question.length > 40 ? entry.question.slice(0, 37) + '…' : entry.question;
                li.innerHTML = `<span style="flex:1;">${escapeHtml(shortQ)}</span><button class="remove-history" data-idx="${idx}">✕</button>`;
                li.querySelector('.remove-history').addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyEntries.splice(idx, 1);
                    saveHistoryToLocal();
                    showMenu();
                });
                li.addEventListener('click', () => {
                    applyPayload(entry);
                    closeMenu(overlay);
                });
                list.appendChild(li);
            });
        }
        overlay.appendChild(panel);
        document.body.appendChild(overlay);
        document.getElementById('closeMenuBtn').addEventListener('click', () => closeMenu(overlay));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeMenu(overlay); });
    }
    
    function closeMenu(overlay) { if (overlay?.parentNode) overlay.remove(); }
    burgerBtn.addEventListener('click', showMenu);
    
    // Control toggles
    toggleGridBtn.addEventListener('click', () => {
        showGrid = !showGrid;
        toggleGridBtn.innerText = showGrid ? "🔲 Grid ON" : "🔲 Grid OFF";
        toggleGridBtn.classList.toggle('active', showGrid);
        saveSettings();
        if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        addLog(`Grid ${showGrid ? 'enabled' : 'disabled'}`);
    });
    
    toggleContourBtn.addEventListener('click', () => {
        showContour = !showContour;
        toggleContourBtn.innerText = showContour ? "📐 Contour ON" : "✍️ Contour OFF";
        toggleContourBtn.classList.toggle('active', showContour);
        saveSettings();
        if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        addLog(`Contour ${showContour ? 'enabled' : 'disabled'}`);
    });
    
    toggleHintBtn.addEventListener('click', () => {
        showHint = !showHint;
        toggleHintBtn.innerText = showHint ? "💡 Hint ON" : "💡 Hint OFF";
        toggleHintBtn.classList.toggle('active', showHint);
        saveSettings();
        if (showHint && currentHint) {
            hintRow.innerText = `💡 Hint: ${currentHint}`;
            hintRow.classList.add('visible');
        } else {
            hintRow.classList.remove('visible');
        }
        addLog(`Hint ${showHint ? 'shown' : 'hidden'}`);
    });
    
    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        }, 200);
    });
    
    window.addEventListener('hashchange', () => {
        const loaded = loadFromURL();
        if (!loaded && !currentPayload) showBuilderUI();
        else if (loaded && currentPayload) renderBoxes();
    });
    
    // Initialize
    function init() {
        loadSettings();
        loadHistoryFromLocal();
        const loaded = loadFromURL();
        if (!loaded) showBuilderUI();
    }
    
    init();
</script>
</body>
</html>
