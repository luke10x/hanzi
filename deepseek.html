<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Hanzi Canvas | Stroke Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@2.2.1/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 700px;
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .burger-menu {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .burger-menu:hover { background: #f1f5f9; }
        
        .control-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .ctrl-btn {
            background: #eef2ff;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .ctrl-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        .copy-log-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .landing-link {
            background: #8b5cf6;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .question-row {
            padding: 14px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
        }
        
        .hint-row {
            padding: 8px 20px;
            background: #fef9c3;
            border-bottom: 1px solid #eab308;
            font-size: 0.85rem;
            color: #854d0e;
            text-align: center;
            display: none;
        }
        .hint-row.visible {
            display: block;
        }
        
        .boxes-container {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 14px;
        }
        
        .hanzi-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            border-radius: 16px;
            padding: 8px 6px;
            min-width: 78px;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: all 0.1s;
        }
        .hanzi-card.active-card {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .char-box {
            width: 64px;
            height: 64px;
            background: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 500;
        }
        .char-box.state-none { background: #f1f5f9; border: 1px solid #cbd5e1; }
        .char-box.state-started { background: #fef9c3; border: 1px solid #eab308; }
        .char-box.state-completed { background: #bbf7d0; border: 1px solid #22c55e; }
        /* Hide character until completed */
        .char-box.state-none .char-text, .char-box.state-started .char-text {
            display: none;
        }
        .char-box .char-text {
            font-size: 2rem;
        }
        .char-box.state-none::before, .char-box.state-started::before {
            content: "?";
            font-size: 2rem;
            font-weight: bold;
            color: #94a3b8;
        }
        .char-box.state-completed .char-text {
            display: inline;
        }
        .char-box.state-completed::before {
            display: none;
        }
        
        .pinyin-label {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #475569;
        }
        
        .canvas-area {
            background: #ffffff;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: min(75vw, 400px);
            margin: 0 auto;
            background: #fefefe;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        
        #active-canvas-container {
            width: 100%;
            height: 100%;
        }
        
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e293b;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: 8px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background: #0f172a;
            color: #cbd5e1;
            font-size: 0.8rem;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            background: #0f172a;
            color: #cbd5e6;
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
        }
        
        .menu-panel {
            width: 300px;
            background: white;
            height: 100%;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }
        
        .history-list li {
            background: #f1f5f9;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }
        
        .remove-history {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .ai-prompt-area {
            padding: 20px;
            background: #fef9e3;
            border-radius: 24px;
            margin: 16px;
            text-align: center;
        }
        
        textarea {
            width: 100%;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            padding: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            margin: 12px 0;
        }
        
        button { cursor: pointer; }
        .close-menu { background: #e2e8f0; border: none; padding: 10px; border-radius: 40px; margin-top: 8px; }
        .error-badge { color: #dc2626; text-align: center; padding: 20px; font-size: 0.8rem; }
        
        @media (max-width: 550px) {
            .ctrl-btn { font-size: 0.7rem; padding: 4px 8px; }
            .landing-link { font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="app" id="appRoot">
    <div class="top-bar">
        <button class="burger-menu" id="burgerBtn"><i class="fas fa-bars"></i></button>
        <div class="control-group">
            <button id="toggleGridBtn" class="ctrl-btn">🔲 Grid OFF</button>
            <button id="toggleContourBtn" class="ctrl-btn">✍️ Contour OFF</button>
            <button id="toggleHintBtn" class="ctrl-btn">💡 Hint OFF</button>
        </div>
        <div style="display: flex; gap: 6px;">
            <a href="#" id="landingLinkBtn" class="landing-link"><i class="fas fa-home"></i> New</a>
            <button id="copyEntireLogBtn" class="copy-log-btn"><i class="far fa-copy"></i> Copy</button>
        </div>
    </div>
    <div class="question-row" id="questionText">— Ready —</div>
    <div class="hint-row" id="hintRow"></div>
    <div class="boxes-container" id="boxesContainer"></div>
    <div class="canvas-area">
        <div class="canvas-wrapper">
            <div id="active-canvas-container"></div>
        </div>
    </div>
    <div class="log-section">
        <div class="log-header"><span>✍️ Practice Log (copy & share with AI)</span></div>
        <div class="log-content" id="logMessages"></div>
    </div>
</div>

<script>
    // ---------------------------- STATE ---------------------------------
    let currentPayload = null;
    let boxesData = [];
    let activeBoxIndex = 0;
    let showContour = false;
    let showGrid = false;
    let showHint = false;
    let currentHint = "";
    let historyEntries = [];
    let logEntries = [];
    
    // DOM elements
    const questionEl = document.getElementById('questionText');
    const hintRow = document.getElementById('hintRow');
    const boxesContainer = document.getElementById('boxesContainer');
    const activeCanvasDiv = document.getElementById('active-canvas-container');
    const logMessagesDiv = document.getElementById('logMessages');
    const toggleGridBtn = document.getElementById('toggleGridBtn');
    const toggleContourBtn = document.getElementById('toggleContourBtn');
    const toggleHintBtn = document.getElementById('toggleHintBtn');
    const copyEntireLogBtn = document.getElementById('copyEntireLogBtn');
    const burgerBtn = document.getElementById('burgerBtn');
    const landingLinkBtn = document.getElementById('landingLinkBtn');
    
    // Helper: add log
    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEntries.push(`[${time}] ${msg}`);
        if (logEntries.length > 500) logEntries.shift();
        renderLog();
    }
    
    function renderLog() {
        if (!logEntries.length) {
            logMessagesDiv.innerHTML = '<span>✨ Draw strokes — feedback appears here ✨</span>';
        } else {
            logMessagesDiv.innerHTML = logEntries.map(l => `<div>${escapeHtml(l)}</div>`).join('');
            logMessagesDiv.scrollTop = logMessagesDiv.scrollHeight;
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Copy log
    copyEntireLogBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(logEntries.join('\n')).then(() => addLog('📋 Log copied to clipboard'));
    });
    
    // Landing page (clear payload)
    landingLinkBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = '';
        currentPayload = null;
        boxesData.forEach(b => { if (b.writer) try { b.writer.destroy(); } catch(e) {} });
        boxesData = [];
        showEmptyPrompt();
        addLog('🏠 Cleared session. Go to landing page.');
    });
    
    // Destroy writer
    function destroyWriter(box) {
        if (box && box.writer) {
            try { box.writer.destroy(); } catch(e) {}
            box.writer = null;
        }
    }
    
    // Update box card visual with "?" until completed
    function updateBoxCardVisual(idx) {
        const card = document.querySelector(`.hanzi-card[data-idx='${idx}']`);
        if (!card) return;
        const charDiv = card.querySelector('.char-box');
        const state = boxesData[idx].state;
        charDiv.classList.remove('state-none', 'state-started', 'state-completed');
        charDiv.classList.add(`state-${state}`);
        
        // Update active highlight
        document.querySelectorAll('.hanzi-card').forEach(c => c.classList.remove('active-card'));
        card.classList.add('active-card');
    }
    
    // Render boxes - characters show as "?" until completed
    function renderBoxes() {
        if (!currentPayload || !boxesData.length) {
            boxesContainer.innerHTML = '<div style="padding:12px">📦 No characters loaded</div>';
            return;
        }
        boxesContainer.innerHTML = '';
        boxesData.forEach((box, idx) => {
            const card = document.createElement('div');
            card.className = 'hanzi-card';
            card.setAttribute('data-idx', idx);
            const displayChar = box.character;
            card.innerHTML = `
                <div class="char-box state-${box.state}">
                    <span class="char-text" style="display: ${box.state === 'completed' ? 'inline' : 'none'}">${displayChar}</span>
                </div>
                <div class="pinyin-label">${box.pinyin || ''}</div>
            `;
            card.addEventListener('click', () => {
                if (activeBoxIndex === idx) return;
                activeBoxIndex = idx;
                loadActiveCanvas();
                renderBoxes();
            });
            boxesContainer.appendChild(card);
        });
        const activeCard = document.querySelector(`.hanzi-card[data-idx='${activeBoxIndex}']`);
        if (activeCard) activeCard.classList.add('active-card');
    }
    
    // Apply writer settings (grid, contour)
    function applyWriterSettings(writer, containerId, character, size) {
        // Recreate with new settings if needed
        if (writer) destroyWriter(boxesData[activeBoxIndex]);
        const newWriter = HanziWriter.create(containerId, character, {
            width: size,
            height: size,
            showCharacter: false,
            padding: 8,
            showOutline: showContour,
            showGrid: showGrid,
            strokeColor: '#3b82f6',
            radicalColor: '#cbd5e1'
        });
        return newWriter;
    }
    
    // Load active canvas
    function loadActiveCanvas() {
        if (!currentPayload || !boxesData.length) return;
        const box = boxesData[activeBoxIndex];
        if (!box) return;
        
        activeCanvasDiv.innerHTML = '';
        const containerId = `writer-${Date.now()}-${activeBoxIndex}`;
        const container = document.createElement('div');
        container.id = containerId;
        container.style.width = '100%';
        container.style.height = '100%';
        activeCanvasDiv.appendChild(container);
        
        destroyWriter(box);
        
        const rect = container.parentElement.getBoundingClientRect();
        const size = Math.min(rect.width, rect.height, 400);
        
        try {
            const writer = HanziWriter.create(containerId, box.character, {
                width: size,
                height: size,
                showCharacter: false,
                padding: 8,
                showOutline: showContour,
                showGrid: showGrid,
                strokeColor: '#3b82f6',
                radicalColor: '#cbd5e1'
            });
            
            box.writer = writer;
            
            setTimeout(() => {
                if (box.state === 'completed') {
                    try {
                        writer.setCharacter(box.character);
                        writer.animateCharacter();
                    } catch(e) {}
                } else {
                    if (box.state === 'none') box.state = 'started';
                    updateBoxCardVisual(activeBoxIndex);
                    
                    writer.quiz({
                        onMistake: (data) => {
                            addLog(`❌ [${box.character}] stroke ${data.strokeNum} mistake (total: ${data.totalMistakes})`);
                        },
                        onCorrectStroke: (data) => {
                            addLog(`✅ [${box.character}] stroke ${data.strokeNum} correct!`);
                        },
                        onComplete: (summary) => {
                            addLog(`🎉 [${box.character}] COMPLETED! Total mistakes: ${summary.totalMistakes}`);
                            box.state = 'completed';
                            updateBoxCardVisual(activeBoxIndex);
                            renderBoxes(); // Refresh to show character instead of "?"
                            if (box.writer) {
                                try {
                                    box.writer.setCharacter(box.character);
                                    box.writer.animateCharacter();
                                } catch(e) {}
                            }
                        }
                    });
                }
            }, 100);
            
        } catch(err) {
            addLog(`⚠️ Error loading "${box.character}": ${err.message}`);
            activeCanvasDiv.innerHTML = `<div class="error-badge">⚠️ "${box.character}" not supported</div>`;
        }
    }
    
    // Apply payload with proper UTF-8 handling
    function applyPayload(payload) {
        if (currentPayload && JSON.stringify(currentPayload) !== JSON.stringify(payload)) {
            const exists = historyEntries.some(e => JSON.stringify(e) === JSON.stringify(payload));
            if (!exists) {
                historyEntries.unshift(payload);
                if (historyEntries.length > 20) historyEntries.pop();
                saveHistoryToLocal();
            }
        }
        
        currentPayload = payload;
        questionEl.innerText = payload.question || "Practice Hanzi";
        currentHint = payload.hint || "";
        if (currentHint && showHint) {
            hintRow.innerText = `💡 Hint: ${currentHint}`;
            hintRow.classList.add('visible');
        } else {
            hintRow.classList.remove('visible');
        }
        
        // Parse answer string into characters (handle spaces as separators)
        const answerStr = payload.answer;
        const pinyinArray = payload.pinyin || [];
        const characters = [];
        
        // Split by spaces to preserve word boundaries, but each character is separate
        const words = answerStr.split(/\s+/);
        for (let word of words) {
            for (let ch of word) {
                characters.push(ch);
            }
        }
        
        boxesData.forEach(box => destroyWriter(box));
        boxesData = [];
        
        for (let i = 0; i < characters.length; i++) {
            boxesData.push({
                character: characters[i],
                pinyin: pinyinArray[i] || "",
                state: 'none',
                writer: null
            });
        }
        
        activeBoxIndex = 0;
        renderBoxes();
        setTimeout(() => {
            if (boxesData.length) loadActiveCanvas();
        }, 50);
        
        addLog(`📚 Loaded: "${payload.question}" — ${boxesData.length} character(s)`);
    }
    
    // Base64 UTF-8 decode
    function base64ToUtf8(str) {
        try {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) {
            return atob(str);
        }
    }
    
    // Load from URL hash
    function loadFromURL() {
        let encoded = null;
        if (window.location.hash && window.location.hash.length > 1) {
            encoded = window.location.hash.substring(1);
        }
        
        if (encoded) {
            try {
                const jsonStr = base64ToUtf8(encoded);
                const payload = JSON.parse(jsonStr);
                if (payload.question && payload.answer && Array.isArray(payload.pinyin)) {
                    applyPayload(payload);
                    return true;
                }
            } catch(e) {
                addLog(`⚠️ Invalid payload: ${e.message}`);
            }
        }
        return false;
    }
    
    // Save/load settings to localStorage
    function saveSettings() {
        localStorage.setItem('hanzi_settings', JSON.stringify({
            showContour, showGrid, showHint
        }));
    }
    
    function loadSettings() {
        try {
            const saved = localStorage.getItem('hanzi_settings');
            if (saved) {
                const settings = JSON.parse(saved);
                showContour = settings.showContour || false;
                showGrid = settings.showGrid || false;
                showHint = settings.showHint || false;
            }
        } catch(e) {}
        // Update button UI
        toggleContourBtn.innerText = showContour ? "📐 Contour ON" : "✍️ Contour OFF";
        toggleContourBtn.classList.toggle('active', showContour);
        toggleGridBtn.innerText = showGrid ? "🔲 Grid ON" : "🔲 Grid OFF";
        toggleGridBtn.classList.toggle('active', showGrid);
        toggleHintBtn.innerText = showHint ? "💡 Hint ON" : "💡 Hint OFF";
        toggleHintBtn.classList.toggle('active', showHint);
        
        if (showHint && currentHint) {
            hintRow.innerText = `💡 Hint: ${currentHint}`;
            hintRow.classList.add('visible');
        } else {
            hintRow.classList.remove('visible');
        }
    }
    
    // Save history
    function saveHistoryToLocal() {
        try {
            localStorage.setItem('hanzi_history_v4', JSON.stringify(historyEntries));
        } catch(e) {}
    }
    
    function loadHistoryFromLocal() {
        try {
            const stored = localStorage.getItem('hanzi_history_v4');
            if (stored) historyEntries = JSON.parse(stored).slice(0, 20);
        } catch(e) {}
    }
    
    // Menu with previous questions
    function showMenu() {
        const overlay = document.createElement('div');
        overlay.className = 'menu-overlay';
        const panel = document.createElement('div');
        panel.className = 'menu-panel';
        panel.innerHTML = `<h4>📜 Previous Questions</h4><ul class="history-list" id="menuHistoryList"></ul><button class="close-menu" id="closeMenuBtn">Close Menu</button>`;
        
        const list = panel.querySelector('#menuHistoryList');
        if (historyEntries.length === 0) {
            list.innerHTML = '<li style="background:transparent; text-align:center;">No history yet</li>';
        } else {
            historyEntries.forEach((entry, idx) => {
                const li = document.createElement('li');
                const shortQ = entry.question.length > 40 ? entry.question.slice(0, 37) + '…' : entry.question;
                li.innerHTML = `<span style="flex:1;">${escapeHtml(shortQ)}</span><button class="remove-history" data-idx="${idx}">✕</button>`;
                li.querySelector('.remove-history').addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyEntries.splice(idx, 1);
                    saveHistoryToLocal();
                    showMenu();
                });
                li.addEventListener('click', () => {
                    applyPayload(entry);
                    closeMenu(overlay);
                });
                list.appendChild(li);
            });
        }
        overlay.appendChild(panel);
        document.body.appendChild(overlay);
        document.getElementById('closeMenuBtn').addEventListener('click', () => closeMenu(overlay));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeMenu(overlay); });
    }
    
    function closeMenu(overlay) { if (overlay?.parentNode) overlay.remove(); }
    burgerBtn.addEventListener('click', showMenu);
    
    // Control toggles
    toggleGridBtn.addEventListener('click', () => {
        showGrid = !showGrid;
        toggleGridBtn.innerText = showGrid ? "🔲 Grid ON" : "🔲 Grid OFF";
        toggleGridBtn.classList.toggle('active', showGrid);
        saveSettings();
        if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        addLog(`Grid ${showGrid ? 'enabled' : 'disabled'}`);
    });
    
    toggleContourBtn.addEventListener('click', () => {
        showContour = !showContour;
        toggleContourBtn.innerText = showContour ? "📐 Contour ON" : "✍️ Contour OFF";
        toggleContourBtn.classList.toggle('active', showContour);
        saveSettings();
        if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        addLog(`Contour ${showContour ? 'enabled' : 'disabled'}`);
    });
    
    toggleHintBtn.addEventListener('click', () => {
        showHint = !showHint;
        toggleHintBtn.innerText = showHint ? "💡 Hint ON" : "💡 Hint OFF";
        toggleHintBtn.classList.toggle('active', showHint);
        saveSettings();
        if (showHint && currentHint) {
            hintRow.innerText = `💡 Hint: ${currentHint}`;
            hintRow.classList.add('visible');
        } else {
            hintRow.classList.remove('visible');
        }
        addLog(`Hint ${showHint ? 'shown' : 'hidden'}`);
    });
    
    // Empty state with AI prompt
    function showEmptyPrompt() {
        questionEl.innerText = "🤖 AI Hanzi Learning Assistant";
        boxesContainer.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'ai-prompt-area';
        div.innerHTML = `
            <strong>✨ No active quiz</strong><br>
            <div style="text-align:left; font-size:0.75rem; margin-top:8px;">
            <strong>Standard payload format:</strong><br>
            <code>{"question":"...","answer":"汉字","pinyin":["han","zi"],"hint":"..."}</code>
            </div>
            <textarea id="aiPromptText" rows="5">Create a Hanzi practice JSON following the standard format:
{
  "question": "How do you say 'Hello' in Chinese?",
  "answer": "你好",
  "pinyin": ["nǐ", "hǎo"],
  "hint": "Two characters meaning 'you' and 'good'"
}
Encode to base64 and use: #BASE64_HERE</textarea>
            <button id="copyPromptBtn">📋 Copy Prompt</button>
            <div style="margin-top:12px; font-size:0.7rem; word-break:break-all;">
            <strong>Example link:</strong><br>
            <code>#eyJxdWVzdGlvbiI6IkhvdyBkbyB5b3Ugc2F5ICdIZWxsbycgaW4gQ2hpbmVzZT8iLCJhbnN3ZXIiOiLkvaDlpb0iLCJwaW55aW4iOlsiJW4kIiwiaMOjbyJdLCJoaW50IjoiVHdvIGNoYXJhY3RlcnMifQ==</code>
            </div>
        `;
        boxesContainer.appendChild(div);
        activeCanvasDiv.innerHTML = '<div style="text-align:center; padding:2rem;">⬆️ Add #payload to URL</div>';
        document.getElementById('copyPromptBtn')?.addEventListener('click', () => {
            const txt = document.getElementById('aiPromptText').value;
            navigator.clipboard.writeText(txt);
            addLog("📋 AI prompt copied");
        });
    }
    
    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (currentPayload && boxesData[activeBoxIndex]) loadActiveCanvas();
        }, 200);
    });
    
    window.addEventListener('hashchange', () => {
        const loaded = loadFromURL();
        if (!loaded && !currentPayload) showEmptyPrompt();
        else if (loaded && currentPayload) renderBoxes();
    });
    
    // Initialize
    function init() {
        loadSettings();
        loadHistoryFromLocal();
        const loaded = loadFromURL();
        if (!loaded) showEmptyPrompt();
    }
    
    init();
</script>
</body>
</html>
