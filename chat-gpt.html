<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanzi Trainer</title>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
.topbar { display:flex; gap:6px; padding:6px; background:#222; color:#fff; align-items:center; }
button { padding:6px; cursor:pointer; }
.row { padding:8px; }
.boxes { display:flex; flex-wrap:wrap; gap:6px; }
.char-box {
  width:64px; height:64px; border:2px solid #ccc;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  cursor:pointer;
}
.active { border-color:orange; }
.done { background:#c8f7c5; }
.in-progress { background:#fff3cd; }

#canvas { width:100%; max-width:420px; aspect-ratio:1; margin:auto; }

.log {
  height:140px; overflow:auto;
  background:#111; color:#0f0; font-size:12px; padding:6px;
}

.menu {
  position:fixed; left:0; top:0; width:220px; height:100%;
  background:#333; color:#fff; padding:10px;
  transform:translateX(-100%);
  transition:0.2s;
  overflow:auto;
}
.menu.open { transform:translateX(0); }

.menu-item { padding:6px; border-bottom:1px solid #555; cursor:pointer; }

input { width:100%; margin-bottom:6px; padding:6px; }
</style>
</head>

<body>

<div class="topbar">
  <button onclick="toggleMenu()">☰</button>
  <button onclick="goHome()">Home</button>
  <button onclick="toggleSetting('grid')">Grid</button>
  <button onclick="toggleSetting('outline')">Contour</button>
  <button onclick="toggleSetting('hint')">Hint</button>
</div>

<div id="menu" class="menu"></div>
<div id="app"></div>

<script>
// ---------- UTF8 BASE64 ----------
function encode64(str){
  return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
}
function decode64(str){
  return new TextDecoder().decode(
    Uint8Array.from(atob(str), c=>c.charCodeAt(0))
  );
}

// ---------- STATE ----------
let data=null, writer=null;
let active=0;
let progress=[];
let totalMistakes=[];
let settings = JSON.parse(localStorage.getItem("settings")||"{}");

// ---------- UTIL ----------
function now(){
  return new Date().toLocaleTimeString();
}
function log(msg){
  const el=document.getElementById('log');
  if(!el) return;
  el.innerHTML += `[${now()}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

// ---------- PARSE ----------
function parse(){
  if(!location.hash) return null;
  try{
    const d = JSON.parse(decode64(location.hash.slice(1)));

    d.answer = Array.from(d.answer.replace(/\s+/g,''));
    while((d.pinyin||[]).length < d.answer.length) d.pinyin.push("");

    return d;
  }catch(e){
    console.error(e);
    return null;
  }
}

// ---------- BUILDER ----------
function renderBuilder(){
  app.innerHTML = `
  <div class="row">
    <h3>Create Exercise</h3>
    <input id="q" placeholder="Question">
    <input id="a" placeholder="Answer e.g. 你好">
    <input id="p" placeholder="Pinyin e.g. nǐ hǎo">
    <input id="h" placeholder="Hint (optional)">
    <button onclick="build()">Generate & Start</button>
  </div>`;
}

function build(){
  const payload={
    question:q.value.trim(),
    answer:a.value.trim(),
    pinyin:p.value.trim()?p.value.trim().split(/\s+/):[],
    hint:h.value.trim()
  };
  location.href = location.pathname + "#" + encode64(JSON.stringify(payload));
}

// ---------- TRAINER ----------
function renderTrainer(){
  app.innerHTML = `
  <div class="row">${data.question}</div>
  <div id="hintRow" class="row" style="display:${settings.hint?'block':'none'}">
    💡 ${data.hint||''}
  </div>
  <div id="boxes" class="row boxes"></div>
  <div id="canvas"></div>
  <div class="row"><button onclick="copyLog()">Copy Log</button></div>
  <div id="log" class="log"></div>
  `;

  progress = new Array(data.answer.length).fill(null);
  totalMistakes = new Array(data.answer.length).fill(0);

  renderBoxes();
  setTimeout(()=>loadChar(0),50);

  saveHistory();
  renderMenu();

  log(`📚 Loaded: "${data.question}" — ${data.answer.length} character(s)`);
}

function renderBoxes(){
  const b=document.getElementById('boxes');
  b.innerHTML='';

  data.answer.forEach((ch,i)=>{
    const d=document.createElement('div');
    d.className="char-box";
    if(i===active) d.classList.add("active");
    if(progress[i]==='done') d.classList.add("done");

    d.innerHTML = `
      <div>${progress[i]==='done'?ch:'?'}</div>
      <div style="font-size:10px">${data.pinyin[i]}</div>
    `;
    d.onclick=()=>loadChar(i);
    b.appendChild(d);
  });
}

function loadChar(i){
  active=i;

  const canvas=document.getElementById('canvas');
  canvas.innerHTML='';

  const size=canvas.offsetWidth;

  writer = HanziWriter.create('canvas', data.answer[i], {
    width:size,
    height:size,
    showCharacter: !!settings.outline,
    showOutline: !!settings.outline,
    padding:5
  });

  writer.quiz({
    onMistake:(s)=>{
      totalMistakes[i]++;
      progress[i]='in-progress';
      renderBoxes();
      log(`❌ [${data.answer[i]}] stroke ${s.strokeNum} mistake (total: ${totalMistakes[i]})`);
    },
    onCorrectStroke:(s)=>{
      log(`✅ [${data.answer[i]}] stroke ${s.strokeNum} correct!`);
    },
    onComplete:()=>{
      progress[i]='done';
      renderBoxes();
      log(`🎉 [${data.answer[i]}] COMPLETED! Total mistakes: ${totalMistakes[i]}`);

      if(i+1 < data.answer.length){
        loadChar(i+1);
      }
    }
  });

  renderBoxes();
}

// ---------- MENU ----------
function toggleMenu(){
  menu.classList.toggle("open");
}
function renderMenu(){
  const h = JSON.parse(localStorage.getItem("history")||"[]");
  menu.innerHTML = "<h4>History</h4>";

  h.forEach(item=>{
    const d=document.createElement('div');
    d.className="menu-item";
    d.innerText=item.question;
    d.onclick=()=>{
      location.hash = encode64(JSON.stringify(item));
      location.reload();
    };
    menu.appendChild(d);
  });
}
function saveHistory(){
  let h=JSON.parse(localStorage.getItem("history")||"[]");
  h.unshift(data);
  localStorage.setItem("history",JSON.stringify(h.slice(0,20)));
}

// ---------- SETTINGS ----------
function toggleSetting(k){
  settings[k]=!settings[k];
  localStorage.setItem("settings",JSON.stringify(settings));
  log(`${k} ${settings[k]?'enabled':'disabled'}`);
  location.reload();
}

// ---------- NAV ----------
function goHome(){
  location.href = location.pathname;
}

// ---------- LOG ----------
function copyLog(){
  navigator.clipboard.writeText(log.innerText);
}

// ---------- BOOT ----------
const app=document.getElementById('app');
const menu=document.getElementById('menu');

data = parse();

if(!data){
  renderBuilder();
}else{
  renderTrainer();
}
</script>

</body>
</html>
